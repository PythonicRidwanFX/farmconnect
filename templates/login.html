                /* ==========================
           GLOBAL STYLES
        ========================== */

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        html{
            scroll-behavior:smooth;
        }

        body{

            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            padding:25px;

            background:
            linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
            url("https://images.unsplash.com/photo-1500595046743-cd271d694d30")
            center center/cover no-repeat;

        }

        /* ==========================
           LOGIN CARD
        ========================== */

        .login-container{

            width:100%;
            max-width:420px;

            padding:45px 35px;

            border-radius:20px;

            background:rgba(255,255,255,.15);

            backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,.2);

            box-shadow:
            0 20px 45px rgba(0,0,0,.35);

            animation:fadeIn .7s ease;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(30px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        /* ==========================
           TITLE
        ========================== */

        .login-container h2{

            color:#fff;

            text-align:center;

            font-size:30px;

            margin-bottom:10px;

            font-weight:700;
        }

        .login-container p{

            text-align:center;

            color:#eee;

            margin-bottom:25px;
        }

        /* ==========================
           INPUTS
        ========================== */

        input{

            width:100%;

            height:52px;

            padding:0 18px;

            margin-bottom:18px;

            border:none;

            outline:none;

            border-radius:10px;

            background:rgba(255,255,255,.92);

            font-size:15px;

            transition:.35s;
        }

        input::placeholder{

            color:#777;
        }

        input:focus{

            background:#fff;

            transform:translateY(-2px);

            box-shadow:

            0 0 0 4px rgba(40,167,69,.25);
        }

        /* ==========================
           BUTTON
        ========================== */

        button{

            width:100%;

            height:54px;

            border:none;

            border-radius:12px;

            cursor:pointer;

            color:#fff;

            font-size:17px;

            font-weight:600;

            background:linear-gradient(135deg,#28a745,#20c997);

            transition:.35s;
        }

        button:hover{

            transform:translateY(-3px);

            box-shadow:

            0 12px 25px rgba(0,0,0,.25);

            background:linear-gradient(135deg,#218838,#1ba784);
        }

        button:active{

            transform:scale(.98);
        }

        /* ==========================
           LINKS
        ========================== */

        .links{

            margin-top:25px;

            text-align:center;
        }

        .links a{

            display:block;

            color:#fff;

            text-decoration:none;

            margin-top:12px;

            font-size:15px;

            transition:.3s;
        }

        .links a:hover{

            color:#ffe082;

            text-decoration:underline;
        }

        /* ==========================
           ERROR MESSAGE
        ========================== */

        .error{

            padding:12px;

            margin-bottom:18px;

            border-radius:10px;

            background:#ffebee;

            color:#c62828;

            font-size:14px;

            font-weight:600;

            border-left:5px solid #f44336;

            animation:slideDown .4s ease;
        }

        @keyframes slideDown{

            from{
                opacity:0;
                transform:translateY(-20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

        /* ==========================
           TABLET
        ========================== */

        @media(max-width:768px){

        .login-container{

            max-width:100%;

            padding:35px 25px;
        }

        .login-container h2{

            font-size:26px;
        }

        button{

            height:50px;
        }

        }

        /* ==========================
           MOBILE
        ========================== */

        @media(max-width:480px){

        body{

            padding:18px;
        }

        .login-container{

            padding:28px 20px;

            border-radius:15px;
        }

        .login-container h2{

            font-size:22px;
        }

        input{

            height:48px;

            font-size:14px;
        }

        button{

            height:48px;

            font-size:15px;
        }

        .links a{

            font-size:14px;
        }

        }

        /* ==========================
           LARGE SCREEN
        ========================== */

        @media(min-width:1400px){

        .login-container{

            max-width:450px;
        }

        }

        /* ==========================
           SCROLLBAR
        ========================== */

        ::-webkit-scrollbar{

            width:8px;
        }

        ::-webkit-scrollbar-thumb{

            background:#28a745;

            border-radius:20px;
        }
