<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FarmConnect</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

/* ==========================================
   RESET
========================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;

    background:
    linear-gradient(rgba(0,0,0,.60),rgba(0,0,0,.60)),
    url("https://images.unsplash.com/photo-1500595046743-cd271d694d30?auto=format&fit=crop&w=1800&q=80")
    center center/cover no-repeat;

    overflow-x:hidden;
}

/* ==========================================
   LOGIN CARD
========================================== */

.login-container{

    width:100%;
    max-width:430px;

    padding:45px 35px;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.20);

    border-radius:22px;

    box-shadow:
    0 20px 50px rgba(0,0,0,.35);

    animation:fadeIn .8s ease;
}

/* ==========================================
   ANIMATION
========================================== */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* ==========================================
   TITLE
========================================== */

.login-container h2{

    text-align:center;

    color:#fff;

    font-size:32px;

    font-weight:700;

    margin-bottom:10px;
}

.login-container p{

    text-align:center;

    color:#f1f1f1;

    margin-bottom:30px;

    font-size:15px;
}

/* ==========================================
   ERROR MESSAGE
========================================== */

.error{

    background:#ffebee;

    color:#c62828;

    padding:12px;

    border-left:5px solid #f44336;

    border-radius:10px;

    margin-bottom:20px;

    font-size:14px;

    font-weight:600;
}

/* ==========================================
   INPUTS
========================================== */

input{

    width:100%;

    height:54px;

    padding:0 18px;

    margin-bottom:18px;

    border:none;

    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,.95);

    color:#333;

    font-size:15px;

    transition:.3s;
}

input::placeholder{
    color:#777;
}

input:focus{

    background:#fff;

    box-shadow:
    0 0 0 4px rgba(40,167,69,.20);

    transform:translateY(-2px);
}

/* ==========================================
   BUTTON
========================================== */

button{

    width:100%;

    height:56px;

    border:none;

    border-radius:12px;

    cursor:pointer;

    color:#fff;

    font-size:16px;

    font-weight:600;

    background:
    linear-gradient(
    135deg,
    #28a745,
    #20c997
    );

    transition:.35s;
}

button:hover{

    transform:translateY(-3px);

    box-shadow:
    0 12px 25px rgba(0,0,0,.25);

    background:
    linear-gradient(
    135deg,
    #218838,
    #1ba784
    );
}

button:active{
    transform:scale(.98);
}

/* ==========================================
   LINKS
========================================== */

.links{

    text-align:center;

    margin-top:25px;
}

.links a{

    display:block;

    color:#fff;

    text-decoration:none;

    margin-top:12px;

    font-size:15px;

    transition:.3s;
}

.links a:hover{

    color:#FFD54F;

    text-decoration:underline;
}

/* ==========================================
   OPTIONAL LOGO
========================================== */

.login-logo{

    text-align:center;

    margin-bottom:20px;
}

.login-logo i{

    font-size:55px;

    color:#4CAF50;
}

/* ==========================================
   TABLET
========================================== */

@media(max-width:768px){

    .login-container{

        max-width:100%;

        padding:35px 28px;
    }

    .login-container h2{

        font-size:28px;
    }

}

/* ==========================================
   MOBILE
========================================== */

@media(max-width:480px){

    body{
        padding:15px;
    }

    .login-container{

        padding:28px 20px;

        border-radius:18px;
    }

    .login-container h2{

        font-size:24px;
    }

    .login-container p{

        font-size:14px;
    }

    input{

        height:50px;

        font-size:14px;
    }

    button{

        height:50px;

        font-size:15px;
    }

    .links a{

        font-size:14px;
    }

}

/* ==========================================
   LARGE DESKTOP
========================================== */

@media(min-width:1400px){

    .login-container{

        max-width:470px;
    }

}

/* ==========================================
   SCROLLBAR
========================================== */

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#28a745;
    border-radius:20px;
}

::-webkit-scrollbar-track{
    background:#e5e5e5;
}

</style>

</head>

<body>

<div class="login-container">
    <h2>Login to FarmConnect</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="error">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" class="login-form">
        {% csrf_token %}

        <div class="input-group">
            <i class="bi bi-envelope-fill"></i>
            <input type="email" name="email" placeholder="Email Address" required>
        </div>

        <div class="input-group">
            <i class="bi bi-lock-fill"></i>
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">
            <i class="bi bi-box-arrow-in-right"></i>
            Login
        </button>
    </form>

    <div class="links">
        <a href="/register/">Create Account</a>
        <a href="#">Forgot Password?</a>
    </div>
</div>

</body>
</html>
